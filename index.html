<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>KuroBooks ✨</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

<div class="welcome-contenedor">
    <h1 class="titulo-kawaii">📚✨ Bienvenido a KuroBooks ✨📚</h1>
    <p class="subtitulo">Tu rincón mágico de historias, sueños y fantasía</p>

    <div class="botones-welcome">
        <a href="login.html" class="btn">💖 Iniciar Sesión</a>
        <a href="registro.html" class="btn btn-secundario">🌟 Crear Cuenta</a>
    </div>
</div>

</body>
</html>

<form onsubmit="return registrar()" enctype="multipart/form-data">

    <label for="usuario">Nombre de usuario</label>
    <input type="text" id="usuario" required>

    <label for="email">Correo electrónico</label>
    <input type="email" id="email" required>

    <label for="password">Contraseña</label>
    <input type="password" id="password" required>

    <label for="password2">Confirmar contraseña</label>
    <input type="password" id="password2" required>

    <label for="avatar">Sube tu avatar</label>
    <input type="file" id="avatar" accept="image/*">

    <button type="submit">💖 Registrarse 💖</button>
</form>
